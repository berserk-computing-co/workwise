services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - apps/web/.env.local
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - apps/api/.env
      - apps/api/.env.local
    environment:
      # Override DB_HOST: in Docker network, "db" is the service hostname.
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: workwise
      POSTGRES_PASSWORD: workwise_dev_pass
      POSTGRES_DB: workwise_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workwise -d workwise_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
